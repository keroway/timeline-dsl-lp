# pnpm のセキュリティ寄りデフォルトを opt-in する。
# pnpm 11 ではこれらが既定値になる予定。10.x のうちに先取りしている。
# 参考: https://pnpm.io/blog/2025/12/29/pnpm-in-2025

# 公開からの経過時間 (分) がこの値未満のバージョンを解決対象から除外する。
# 1440 分 = 1 日 (pnpm 11 の既定値)。pnpm add / pnpm update 時に効く。
# CI の `pnpm install --frozen-lockfile` では既決のバージョンを使うので影響しない。
minimumReleaseAge: 1440

# 緊急修正等で cooldown を待たずに導入したいパッケージはここで例外指定する。
minimumReleaseAgeExclude: []

# postinstall などのライフサイクルスクリプト実行を明示許可制にする。
# 許可は onlyBuiltDependencies で列挙する。
strictDepBuilds: true
onlyBuiltDependencies:
  # Astro 6 が画像最適化に使う ネイティブビルド依存。
  # node-gyp の install スクリプトでプラットフォーム別バイナリを取得する。
  - sharp
  # Astro / Vite が内部で使うバンドラ。
  # install スクリプトでプラットフォーム別バイナリの解決を検証する。
  - esbuild
  # git pre-commit フックを .git/hooks/ にインストールする。
  # postinstall で自動設定するが、prepare スクリプトでも手動再実行できる。
  - simple-git-hooks

# git:/http: など標準レジストリ以外を経由した間接依存をブロックする。
blockExoticSubdeps: true

# provenance (公開方法の信頼レベル) が下がる更新を拒否する。
trustPolicy: no-downgrade

# trustPolicy の例外。ここに挙げた package@version だけ no-downgrade 判定を免除する。
# 同一パッケージ名は 1 エントリにまとめ、複数版は `||` で並べる (別行に分けると先頭しか効かない)。
# semver: lighthouse (@lhci/cli の依存, dev 専用) が古い 5.x / 6.x を間接利用する。
#   いずれも 2023 年以前の公開で provenance attestation を持たないため downgrade 判定されるが、
#   semver はエコシステム標準の versioning ライブラリで実害はない。本番バンドルには含まれない。
trustPolicyExclude:
  - "semver@5.7.2 || 6.3.1"
