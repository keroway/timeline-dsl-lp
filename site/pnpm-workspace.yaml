# pnpm 11 では overrides / patchedDependencies は pnpm-workspace.yaml に置く
# (package.json#pnpm からの移動)。
overrides:
  esbuild: 0.28.1
  fast-uri: 3.1.2
  js-yaml: 4.3.0
  tmp: 0.2.7
  undici: 7.28.0
  uuid: 11.1.1
  yaml: 2.8.4

patchedDependencies:
  "@lhci/utils@0.15.1": patches/@lhci__utils@0.15.1.patch
  "undici@7.28.0": patches/undici@7.28.0.patch

# pnpm 11 のセキュリティ寄りデフォルト (minimumReleaseAge=1440 / strictDepBuilds /
# blockExoticSubdeps) は既定値のまま使う。
# 参考: https://pnpm.io/blog/2025/12/29/pnpm-in-2025

# 緊急修正等で cooldown (minimumReleaseAge) を待たずに導入したい
# パッケージはここで例外指定する。
minimumReleaseAgeExclude: []

# pnpm 11 はデフォルトで依存の build スクリプト実行を遮断する (strictDepBuilds)。
# 実行を許可するものだけ allowBuilds で明示する。
allowBuilds:
  # Astro 6 が画像最適化に使うネイティブビルド依存。
  # node-gyp の install スクリプトでプラットフォーム別バイナリを取得する。
  sharp: true
  # Astro / Vite が内部で使うバンドラ。
  # install スクリプトでプラットフォーム別バイナリの解決を検証する。
  esbuild: true
  # git pre-commit フックを .git/hooks/ にインストールする。
  # postinstall で自動設定するが、prepare スクリプト (lefthook install) でも手動再実行できる。
  lefthook: true

# git:/http: など標準レジストリ以外を経由した間接依存をブロックする。
blockExoticSubdeps: true

# provenance (公開方法の信頼レベル) が下がる更新を拒否する。
trustPolicy: no-downgrade

# trustPolicy の例外。ここに挙げた package@version だけ no-downgrade 判定を免除する。
# 同一パッケージ名は 1 エントリにまとめ、複数版は `||` で並べる (別行に分けると先頭しか効かない)。
# semver: lighthouse (@lhci/cli の依存, dev 専用) が古い 5.x / 6.x を間接利用する。
#   いずれも 2023 年以前の公開で provenance attestation を持たないため downgrade 判定されるが、
#   semver はエコシステム標準の versioning ライブラリで実害はない。本番バンドルには含まれない。
trustPolicyExclude:
  - "semver@5.7.2 || 6.3.1"
