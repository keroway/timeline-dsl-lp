# lefthook config — https://lefthook.dev/configuration/
#
# ローカルの pre-commit で機械的にチェックできる部分(フォーマット/lint/typecheck)
# を自動実行し、CI (.github/workflows/site-build.yml) で検知するより前に潰す。
#
# 導入: `cd site && pnpm install` の prepare で `lefthook install` が走り、
# .git/hooks/pre-commit が自動で同期される。

pre-commit:
  parallel: true
  jobs:
    - name: biome check (staged files)
      root: site/
      glob: "*.{ts,js,mjs,json}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: prettier (astro / md / mdx)
      root: site/
      glob: "*.{astro,md,mdx}"
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true

    - name: astro check (typecheck)
      root: site/
      glob: "src/**/*"
      run: pnpm astro check
