name: Remove in-progress label on close

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to strip the in-progress label from
        required: true
        type: number

permissions:
  issues: write
  pull-requests: read

jobs:
  remove-label:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const LABEL = "in-progress";
            const { owner, repo } = context.repo;

            const removeLabel = async (issueNumber) => {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: LABEL,
                });
                core.info(`Removed '${LABEL}' from #${issueNumber}`);
              } catch (err) {
                if (err.status === 404) {
                  core.info(`Label '${LABEL}' not present on #${issueNumber}; skipping.`);
                  return;
                }
                throw err;
              }
            };

            if (context.eventName === "workflow_dispatch") {
              const n = Number(context.payload.inputs.issue_number);
              if (!Number.isFinite(n) || n <= 0) {
                core.setFailed(`Invalid issue_number input: ${context.payload.inputs.issue_number}`);
                return;
              }
              await removeLabel(n);
              return;
            }

            if (context.eventName === "issues") {
              await removeLabel(context.issue.number);
              return;
            }

            if (context.eventName === "pull_request") {
              const pr = context.payload.pull_request;
              if (!pr || !pr.merged) {
                core.info("PR closed without merge; skipping.");
                return;
              }

              // Strip fenced/inline code and quoted lines so example snippets
              // like "Closes #123" inside backticks don't trigger label removal.
              const body = (pr.body || "")
                .replace(/```[\s\S]*?```/g, "")
                .replace(/`[^`\n]*`/g, "")
                .replace(/^\s*>.*$/gm, "");

              // GitHub's closing keywords (case-insensitive). Same-repo refs only.
              const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s+#(\d+)\b/gi;
              const numbers = new Set();
              for (const m of body.matchAll(re)) {
                numbers.add(Number(m[1]));
              }

              if (numbers.size === 0) {
                core.info("No closing references found in PR body; skipping.");
                return;
              }

              core.info(`Closing references: ${[...numbers].join(", ")}`);
              for (const n of numbers) {
                await removeLabel(n);
              }
              return;
            }

            core.warning(`Unhandled event: ${context.eventName}`);
