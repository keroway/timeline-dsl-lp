name: Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/cloudflare-pages.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy. Empty uses the selected workflow ref."
        required: false
        default: ""
      pages_branch:
        description: "Cloudflare Pages branch name. Use main for production; any other value creates a preview."
        required: true
        default: "manual-preview"

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.3"
  CLOUDFLARE_PROJECT_NAME: timeline-dsl
  PAGES_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.pages_branch || 'main' }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event_name == 'release' && github.event.release.target_commitish || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Build site
        run: pnpm build
        working-directory: site

      - name: Validate Cloudflare Pages branch
        id: pages-branch
        shell: bash
        env:
          REQUESTED_PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
        run: |
          if [[ ! "${REQUESTED_PAGES_BRANCH}" =~ ^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$ ]]; then
            echo "Invalid Cloudflare Pages branch: ${REQUESTED_PAGES_BRANCH}" >&2
            exit 1
          fi

          echo "branch=${REQUESTED_PAGES_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy site/dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=${{ steps.pages-branch.outputs.branch }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish deployment summary
        run: |
          {
            echo "### Cloudflare Pages deployment"
            echo ""
            echo "- Branch: ${{ steps.pages-branch.outputs.branch }}"
            echo "- Deployment URL: ${{ steps.deploy.outputs.deployment-url }}"
            echo "- Alias URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
