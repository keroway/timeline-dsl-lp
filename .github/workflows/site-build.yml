name: Site build

# NOTE: `pull_request` / `push` triggers intentionally have NO `paths` filter.
# The `main protection` ruleset requires a status check named "build" on every
# PR into main. If this workflow only triggered on `site/**` changes, PRs that
# never touch those paths (e.g. README-only docs PRs) would never get a
# "build" check reported at all, and the required-status-check would stay
# stuck at "Expected — waiting for status to be reported" forever, blocking
# merge permanently (see #463).
#
# Instead, the workflow always runs, but the `changes` job detects whether
# the PR/push actually touches site-relevant paths. The `build` job itself is
# never skipped at the job level (job-level `if` produces a "skipped"
# conclusion, which does not satisfy a required status check) — instead, each
# expensive step is individually gated with `if: needs.changes.outputs.site
# == 'true'`. When nothing relevant changed, the job still runs and reports
# "build" success quickly, with all real steps skipped.
#
# Local mirror: the steps below are the authoritative sequence. `pnpm check`
# (lint / format:check / test:unit / build / bundle-size) mirrors the non-
# browser steps, and `pnpm check:full` additionally runs a preview server
# plus every browser-dependent gate (smoke:i18n:browser, smoke:playground:
# browser, smoke:a11y, test:visual, lhci) with guaranteed preview cleanup.
# Steps stay individually named/artifact-uploading here rather than calling
# one aggregate script, so a CI failure stays attributable to one gate; keep
# both in sync when adding/removing a gate.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # dorny/paths-filter diffs against the base/head commits on `push`
          # events (pull_request uses the GitHub API instead and is
          # unaffected); a shallow depth-1 clone would lack that history.
          fetch-depth: 2

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            site:
              - "site/**"
              - ".github/**"
              - "DESIGN.md"

  build:
    needs: changes
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUN_FULL: ${{ needs.changes.outputs.site == 'true' || github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: env.RUN_FULL == 'true'
        with:
          version: 11.0.8

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: env.RUN_FULL == 'true'
        with:
          node-version: 24
          check-latest: true
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        if: env.RUN_FULL == 'true'
      - name: lint
        if: env.RUN_FULL == 'true'
        run: pnpm lint
      - name: format:check
        if: env.RUN_FULL == 'true'
        run: pnpm format:check
      - name: test:unit
        if: env.RUN_FULL == 'true'
        run: pnpm test:unit
      - run: pnpm build
        if: env.RUN_FULL == 'true'

      - name: bundle-size
        if: env.RUN_FULL == 'true'
        run: pnpm bundle-size

      - name: Install Playwright Chromium (for browser smoke + a11y)
        if: env.RUN_FULL == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Start preview server
        if: env.RUN_FULL == 'true'
        run: pnpm preview &

      - name: Wait for preview server
        if: env.RUN_FULL == 'true'
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4321 -o /dev/null; then
              echo "Preview server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start within 30 seconds" >&2
          exit 1

      - name: smoke:seo
        if: env.RUN_FULL == 'true'
        run: pnpm smoke:seo
        env:
          SEO_BASE_URL: http://127.0.0.1:4321

      - name: smoke:i18n
        if: env.RUN_FULL == 'true'
        run: pnpm smoke:i18n
        env:
          I18N_BASE_URL: http://127.0.0.1:4321

      - name: smoke:i18n:browser
        if: env.RUN_FULL == 'true'
        run: pnpm smoke:i18n:browser
        env:
          I18N_BASE_URL: http://127.0.0.1:4321

      - name: smoke:playground
        if: env.RUN_FULL == 'true'
        run: pnpm smoke:playground
        env:
          PLAYGROUND_BASE_URL: http://127.0.0.1:4321

      - name: smoke:playground:browser
        if: env.RUN_FULL == 'true'
        run: pnpm smoke:playground:browser
        env:
          PLAYGROUND_BASE_URL: http://127.0.0.1:4321

      - name: smoke:a11y
        if: env.RUN_FULL == 'true'
        run: pnpm smoke:a11y
        env:
          A11Y_BASE_URL: http://127.0.0.1:4321

      - name: test:visual (LP screenshot regression)
        if: env.RUN_FULL == 'true'
        run: pnpm test:visual

      - name: Upload visual test diffs
        if: failure() && env.RUN_FULL == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-visual-test-results
          path: site/test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Lighthouse CI (perf / a11y / SEO / best-practices baseline)
        if: env.RUN_FULL == 'true'
        run: pnpm lhci
        env:
          LHCI_BASE_URL: http://127.0.0.1:4321

      - name: Upload Lighthouse reports
        if: always() && env.RUN_FULL == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports
          path: site/.lighthouseci/
          if-no-files-found: ignore
          retention-days: 14

      - name: No relevant changes — skipping full build
        if: env.RUN_FULL != 'true'
        run: echo "No site/**, .github/**, or DESIGN.md changes detected; skipping full build/test/smoke suite."
