name: Site build

on:
  pull_request:
    paths:
      - "site/**"
      - ".github/**"
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.3

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - name: lint
        run: pnpm lint
      - name: format:check
        run: pnpm format:check
      - name: test:unit
        run: pnpm test:unit
      - run: pnpm build

      - name: bundle-size
        run: pnpm bundle-size

      - name: Install Playwright Chromium (for a11y smoke)
        run: pnpm exec playwright install --with-deps chromium

      - name: Start preview server
        run: pnpm preview &

      - name: Wait for preview server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4321 -o /dev/null; then
              echo "Preview server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start within 30 seconds" >&2
          exit 1

      - name: smoke:seo
        run: pnpm smoke:seo
        env:
          SEO_BASE_URL: http://127.0.0.1:4321

      - name: smoke:i18n
        run: pnpm smoke:i18n
        env:
          I18N_BASE_URL: http://127.0.0.1:4321

      - name: smoke:playground
        run: pnpm smoke:playground
        env:
          PLAYGROUND_BASE_URL: http://127.0.0.1:4321

      - name: smoke:a11y
        run: pnpm smoke:a11y
        env:
          A11Y_BASE_URL: http://127.0.0.1:4321

      - name: Lighthouse CI (perf / a11y / SEO / best-practices baseline)
        run: pnpm lhci
        env:
          LHCI_BASE_URL: http://127.0.0.1:4321

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: site/.lighthouseci/
          if-no-files-found: ignore
          retention-days: 14
