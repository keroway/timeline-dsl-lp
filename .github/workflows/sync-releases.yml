name: Sync releases

# 本体リポジトリ (keroway/timeline-dsl) の GitHub Releases を週次で取得し、
# releases.generated.json に差分があれば更新 PR を自動作成する。
on:
  schedule:
    - cron: "0 0 * * 1" # 月曜 09:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          check-latest: true

      # fetch-github-releases.mjs は node 組み込みモジュールのみ使うため pnpm install 不要
      - name: Fetch latest releases
        run: node site/scripts/fetch-github-releases.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # fetchedAt は実行のたびに更新されるため、リリース内容に差分がない場合は
      # 変更を巻き戻して PR 作成をスキップする (idempotent)
      - name: Revert timestamp-only changes
        run: |
          file=site/src/data/releases.generated.json
          if git diff --quiet -- "$file"; then
            echo "No changes."
            exit 0
          fi
          git show "HEAD:$file" | jq 'del(.fetchedAt)' > /tmp/releases-old.json
          jq 'del(.fetchedAt)' "$file" > /tmp/releases-new.json
          if cmp -s /tmp/releases-old.json /tmp/releases-new.json; then
            echo "Only fetchedAt changed. Reverting."
            git checkout -- "$file"
          else
            echo "Release content changed."
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/sync-releases
          delete-branch: true
          commit-message: "chore(data): releases.generated.json を最新リリースに同期する"
          title: "chore(data): releases.generated.json を最新リリースに同期する"
          body: |
            `sync-releases.yml` の週次実行による自動更新です。

            - `node site/scripts/fetch-github-releases.mjs` を実行し、本体リポジトリの GitHub Releases を `site/src/data/releases.generated.json` に反映しました。
            - マージ前に ja / en の changelog ページに最新リリースが表示されることを Cloudflare Pages の preview デプロイで確認してください。
            - 新しいリリースに WASM 表層の変更が含まれる場合は、vendored WASM の更新 issue を別途起票してください（CLAUDE.md「WASM bundling」参照）。

            > [!NOTE]
            > `GITHUB_TOKEN` で作成された PR では `pull_request` トリガーの CI (Site build) が自動起動しません。
            > 必要に応じて PR 画面から workflow を手動実行するか、ブランチを push し直してください。
