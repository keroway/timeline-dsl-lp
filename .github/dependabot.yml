# keroway 標準 dependabot 設定（templates/dependabot.yml ベース）。
# このリポジトリ固有の方針: major は意図しない破壊的変更を防ぐためブロックし、手動で追従する。
version: 2
updates:
  - package-ecosystem: npm
    directory: "/site"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      # マイナー / パッチはまとめて 1 PR にしてノイズを抑える
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # major は意図しない破壊的変更を防ぐためブロックし、手動で追従する
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    labels:
      - dependencies
    groups:
      github-actions:
        update-types:
          - minor
          - patch
    ignore:
      # major は意図しない破壊的変更を防ぐためブロックし、手動で追従する
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
